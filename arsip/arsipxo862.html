<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip XO</title>
    <link rel="icon" type="image/png" href="../../uploads/2026-04-25-jurnal-icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; scroll-behavior: smooth; }
        
        /* Cursor pointer dihapus dari card karena card tidak lagi bisa diklik */
        .arsip-card { transition: all 0.2s ease; border: 1px solid #e2e8f0; background: white; }
        .arsip-card:hover { transform: translateY(-2px); border-color: #f59e0b; box-shadow: 0 10px 20px -10px rgba(245, 158, 11, 0.2); }
        
        .badge-jumlah {
            background: #fffbeb;
            color: #b45309;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 800;
            border: 1px solid #fef3c7;
        }

        .preserve-newline {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #modalContent::-webkit-scrollbar { width: 4px; }
        #modalContent::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .hidden { display: none; }
        #backToTop {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: none;
            z-index: 40;
        }

        #btnClearSearch {
            display: none;
            transition: all 0.2s;
        }
        #filterKeyword:not(:placeholder-shown) ~ #btnClearSearch {
            display: flex;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6">
    <div class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <div class="flex items-center gap-2">
                    <i data-lucide="archive" class="w-6 h-6 text-zinc-900"></i>
                    <h1 class="text-2xl font-black text-slate-900 tracking-tight">Arsip XO</h1>
                </div>
                <p id="recordCounter" class="text-[10px] text-amber-600 font-bold uppercase tracking-[0.2em] mt-1">Database Pengarsipan Digital</p>
            </div>
            <a href="https://forms.fillout.com/t/ebdW6hjik2us" target="_blank" class="p-3 bg-zinc-900 text-white rounded-2xl hover:bg-zinc-800 transition-all shadow-lg border-b-4 border-amber-500">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </a>
        </div>

        <div class="bg-white p-4 rounded-[2rem] shadow-sm border border-slate-200 mb-6">
            <div class="flex flex-col md:flex-row gap-3">
                <div class="relative flex-grow flex items-center">
                    <i data-lucide="search" class="w-4 h-4 absolute left-4 text-slate-400"></i>
                    <input type="text" id="filterKeyword" onkeydown="if(event.key === 'Enter') initialFetch()" placeholder="Cari keterangan atau rincian..." 
                        class="w-full bg-slate-50 border border-slate-100 rounded-2xl pl-11 pr-12 py-3 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-amber-500 transition-all">
                    
                    <button id="btnClearSearch" onclick="clearSearch()" class="absolute right-3 w-7 h-7 bg-slate-200 hover:bg-red-100 text-slate-500 hover:text-red-600 rounded-xl items-center justify-center transition-all">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <button onclick="initialFetch()" class="bg-zinc-900 text-white px-6 py-3 rounded-2xl font-bold text-sm hover:bg-zinc-800 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="search" class="w-4 h-4"></i> Cari
                </button>
            </div>
        </div>

        <div id="loading" class="hidden py-10 text-center">
            <div class="animate-spin inline-block w-6 h-6 border-[3px] border-amber-500 border-t-transparent rounded-full"></div>
        </div>

        <div id="emptyState" class="hidden py-16 text-center bg-white rounded-[2rem] border border-dashed border-slate-300">
            <i data-lucide="folder-open" class="w-10 h-10 text-slate-200 mx-auto mb-3"></i>
            <p class="text-slate-400 text-sm font-medium">Arsip tidak ditemukan.</p>
        </div>

        <div id="arsipList" class="space-y-3"></div>

        <div id="loadMoreArea" class="hidden mt-6 text-center pb-10">
            <button id="btnLoadMore" onclick="fetchMore()" class="text-amber-600 font-extrabold text-xs uppercase tracking-widest hover:text-amber-800 transition-all">
                Tampilkan Lebih Banyak ↓
            </button>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2rem] max-w-sm w-full p-6 shadow-2xl flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center mb-4 shrink-0">
                <h2 class="text-sm font-black text-slate-900 uppercase tracking-tighter flex items-center gap-2">
                    <i data-lucide="paperclip" class="w-4 h-4 text-amber-500"></i> File Lampiran
                </h2>
                <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center bg-slate-100 text-slate-400 hover:text-red-500 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div id="modalContent" class="overflow-y-auto pr-1">
                <div id="modalDocsList" class="grid grid-cols-1 gap-2"></div>
                <button onclick="closeModal()" class="w-full mt-4 py-4 bg-zinc-900 text-white font-bold rounded-2xl hover:bg-zinc-800 transition-all text-sm mb-2 shadow-lg">
                    Tutup
                </button>
            </div>
        </div>
    </div>

    <button id="backToTop" onclick="scrollToTop()" class="bg-zinc-900 text-white p-3.5 rounded-full shadow-2xl hover:scale-110 active:scale-95 transition-all">
        <i data-lucide="arrow-up" class="w-5 h-5"></i>
    </button>

    <script>
        let currentNextCursor = null;
        let displayedResults = [];
    
        function formatRupiah(number) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(number);
        }

        window.onscroll = function() {
            const btn = document.getElementById("backToTop");
            btn.style.display = (window.scrollY > 400) ? "block" : "none";
        };
    
        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
    
        function clearSearch() {
            const input = document.getElementById('filterKeyword');
            input.value = '';
            input.focus();
            initialFetch();
        }
    
        async function initialFetch() {
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('arsipList').innerHTML = '';
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('loadMoreArea').classList.add('hidden');
            document.getElementById('recordCounter').innerText = "MENCARI...";
            
            displayedResults = [];
            currentNextCursor = null;
            await executeFetch();
        }
    
        async function fetchMore() {
            await executeFetch(currentNextCursor);
        }
    
        async function executeFetch(cursor = null) {
            const keyword = document.getElementById('filterKeyword').value;
            try {
                const response = await fetch('/api/arsip-master?type=xo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword: keyword, cursor: null })
                });
                const result = await response.json();
                document.getElementById('loading').classList.add('hidden');
    
                if (result.data && result.data.length > 0) {
                    currentNextCursor = result.next_cursor;
                    renderData(result.data); 
                    document.getElementById('emptyState').classList.add('hidden');
                    document.getElementById('recordCounter').innerText = `${displayedResults.length} ARSIP DITEMUKAN`;
                    document.getElementById('loadMoreArea').classList.toggle('hidden', !result.has_more);
                } else if (!cursor) {
                    document.getElementById('emptyState').classList.remove('hidden');
                    document.getElementById('recordCounter').innerText = `0 ARSIP DITEMUKAN`;
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loading').classList.add('hidden');
            }
        }
    
        function renderData(newData) {
            const listContainer = document.getElementById('arsipList');
            newData.forEach(item => {
                const globalIndex = displayedResults.length;
                displayedResults.push(item);
                const docCount = item.dokumentasi ? item.dokumentasi.length : 0;
    
                const card = document.createElement('div');
                card.className = "arsip-card p-5 rounded-[1.5rem] flex flex-col gap-3";
                
                // card.onclick dihapus agar card tidak trigger modal
    
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex flex-col gap-1">
                            ${formatDateLong(item.tanggal)}
                            <div class="mt-1">
                                <span class="badge-jumlah">${formatRupiah(item.jumlah)}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <a href="editarsipxo72.html?id=${item.id}" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-50 text-slate-400 hover:text-amber-600 transition-colors">
                                <i data-lucide="edit-3" class="w-3.5 h-3.5"></i>
                            </a>
                            ${docCount > 0 ? `
                                <button onclick="showDocs(${globalIndex})" class="flex items-center gap-1.5 px-3 py-1 bg-amber-50 rounded-full border border-amber-100 hover:bg-amber-100 transition-all">
                                    <i data-lucide="paperclip" class="w-3 h-3 text-amber-500"></i>
                                    <span class="text-[10px] font-black text-amber-600">${docCount}</span>
                                </button>
                            ` : ''}
                        </div>
                    </div>
                    <div>
                        <h3 class="text-slate-900 font-bold text-sm leading-snug">${item.keterangan}</h3>
                        <p class="text-slate-500 text-[11px] mt-1 leading-relaxed preserve-newline">${item.rincian_nota}</p>
                    </div>
                `;
                listContainer.appendChild(card);
            });
            lucide.createIcons();
        }
    
        function showDocs(index) {
            const item = displayedResults[index];
            if (!item.dokumentasi || item.dokumentasi.length === 0) return;
            const modal = document.getElementById('detailModal');
            const docsList = document.getElementById('modalDocsList');
            docsList.innerHTML = '';
            item.dokumentasi.forEach(doc => {
                docsList.innerHTML += `
                    <a href="${doc.url}" target="_blank" class="flex items-center gap-3 p-4 bg-slate-50 border border-slate-100 rounded-2xl hover:bg-amber-50 transition-all group">
                        <div class="w-8 h-8 bg-white shrink-0 rounded-xl flex items-center justify-center shadow-sm">
                            <i data-lucide="file" class="w-4 h-4 text-slate-400 group-hover:text-amber-500"></i>
                        </div>
                        <span class="text-xs font-bold text-slate-600 flex-grow break-words">${doc.name || 'Lihat File'}</span>
                        <i data-lucide="external-link" class="w-3 h-3 shrink-0 text-slate-300 group-hover:text-amber-400"></i>
                    </a>
                `;
            });
            modal.classList.remove('hidden');
            lucide.createIcons();
        }
    
        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
    
        function formatDateLong(dateStr) {
            if (!dateStr || dateStr === "-") return "-";
            const d = new Date(dateStr);
            const now = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            const formattedDate = d.toLocaleDateString('id-ID', options);
            const totalDiffDays = Math.floor((now.setHours(0,0,0,0) - d.setHours(0,0,0,0)) / 86400000);
            let relative = "";
            if (totalDiffDays === 0) relative = "Hari ini";
            else if (totalDiffDays === 1) relative = "Kemarin";
            else if (totalDiffDays < 0) relative = `${Math.abs(totalDiffDays)} hari lagi`;
            else {
                let years = now.getFullYear() - d.getFullYear();
                let months = now.getMonth() - d.getMonth();
                let days = now.getDate() - d.getDate();
                if (days < 0) { months--; const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0); days += lastMonth.getDate(); }
                if (months < 0) { years--; months += 12; }
                let parts = [];
                if (years > 0) parts.push(`${years} thn`);
                if (months > 0) parts.push(`${months} bln`);
                if (days > 0) parts.push(`${days} hr`);
                relative = parts.join(' ') + " lalu";
            }
			return `
                <div class="flex items-center gap-2">
                    <span class="text-[11px] font-extrabold text-slate-900">${formattedDate}</span>
                    <span class="text-[11px] font-extrabold text-red-600 lowercase tracking-tight">(${relative})</span>
                </div>
            `;
        }
    
        window.onload = initialFetch;
    </script>
</body>
</html>
