<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INIJO Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6">

    <div id="loginSection" class="max-w-sm w-full bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700">
        <h1 class="text-2xl font-black mb-6 text-center">INIJO TOOLS</h1>
        <input type="password" id="pinInput" placeholder="Masukkan PIN" 
               class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-600 text-center font-bold text-xl tracking-widest mb-4 focus:border-indigo-500 outline-none">
        <button onclick="checkPin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all">
            MASUK
        </button>
        <p id="errMsg" class="text-red-400 text-sm mt-4 text-center hidden font-bold">PIN Salah, coba lagi.</p>
    </div>

    <div id="menuSection" class="max-w-2xl w-full hidden">
        <h1 class="text-3xl font-black mb-8 text-indigo-400">Direktori Alat</h1>
        <div id="linkContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Daftar link akan muncul di sini -->
        </div>
    </div>

    <script>
        async function checkPin() {
            const pin = document.getElementById('pinInput').value;
            const btn = document.querySelector('button');
            const err = document.getElementById('errMsg');

            btn.innerText = "Checking...";
            
            try {
                const response = await fetch(`/api/base?pin=${pin}`);
                const data = await response.json();

                if (response.ok) {
                    showMenu(data);
                } else {
                    err.classList.remove('hidden');
                    btn.innerText = "MASUK";
                }
            } catch (e) {
                alert("Terjadi kesalahan koneksi");
                btn.innerText = "MASUK";
            }
        }

        function showMenu(data) {
            document.getElementById('loginSection').classList.add('hidden');
            const menuSection = document.getElementById('menuSection');
            const container = document.getElementById('linkContainer');
            menuSection.classList.remove('hidden');

            data.forEach(group => {
                let html = `
                    <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                        <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">${group.category}</h2>
                        <div class="space-y-3">
                `;

                group.links.forEach(link => {
                    html += `
                        <a href="${link.url}" class="block p-3 bg-slate-900/50 hover:bg-indigo-600 rounded-xl font-bold transition-all border border-slate-700/50">
                            ${link.name}
                        </a>
                    `;
                });

                html += `</div></div>`;
                container.innerHTML += html;
            });
        }
        
        // Support enter key
        document.getElementById('pinInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPin();
        });
    </script>
</body>
</html>
